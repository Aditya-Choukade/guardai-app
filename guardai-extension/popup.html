<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F172A;
      color: #E2E8F0;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #7F77DD, #534AB7);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #F8FAFC;
    }
    .header-sub {
      font-size: 11px;
      color: #94A3B8;
      margin-left: auto;
    }

    /* Message preview */
    .message-preview {
      margin: 12px 16px 0;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 12px;
      color: #94A3B8;
      line-height: 1.5;
      max-height: 60px;
      overflow: hidden;
      position: relative;
    }
    .message-preview::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 20px;
      background: linear-gradient(transparent, rgba(15,23,42,0.9));
    }

    /* Loading */
    .loading {
      padding: 32px 16px;
      text-align: center;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(127,119,221,0.2);
      border-top-color: #7F77DD;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #94A3B8;
      font-size: 13px;
    }
    .loading-sub {
      color: #64748B;
      font-size: 11px;
      margin-top: 4px;
    }

    /* Verdict */
    .verdict-section {
      padding: 16px 16px 0;
    }
    .verdict-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .verdict-badge.dangerous {
      background: rgba(220,38,38,0.15);
      border: 1px solid rgba(220,38,38,0.3);
    }
    .verdict-badge.suspicious {
      background: rgba(217,119,6,0.15);
      border: 1px solid rgba(217,119,6,0.3);
    }
    .verdict-badge.safe {
      background: rgba(5,150,105,0.15);
      border: 1px solid rgba(5,150,105,0.3);
    }
    .verdict-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .verdict-label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .verdict-badge.dangerous .verdict-label { color: #F87171; }
    .verdict-badge.suspicious .verdict-label { color: #FCD34D; }
    .verdict-badge.safe .verdict-label { color: #34D399; }
    .verdict-confidence {
      font-size: 11px;
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 99px;
      font-weight: 500;
    }
    .verdict-badge.dangerous .verdict-confidence { background: rgba(220,38,38,0.2); color: #F87171; }
    .verdict-badge.suspicious .verdict-confidence { background: rgba(217,119,6,0.2); color: #FCD34D; }
    .verdict-badge.safe .verdict-confidence { background: rgba(5,150,105,0.2); color: #34D399; }

    /* Explanation */
    .explanation {
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      font-size: 13px;
      color: #CBD5E1;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* Flags */
    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .flag-chip {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(127,119,221,0.15);
      border: 1px solid rgba(127,119,221,0.25);
      color: #A5B4FC;
      text-transform: capitalize;
    }
    .flag-chip.otp_request,
    .flag-chip.malware_link { background: rgba(220,38,38,0.12); border-color: rgba(220,38,38,0.25); color: #F87171; }
    .flag-chip.urgency_pressure,
    .flag-chip.prize_scam { background: rgba(217,119,6,0.12); border-color: rgba(217,119,6,0.25); color: #FCD34D; }
    .flag-chip.suspicious_url,
    .flag-chip.newly_registered_domain { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.25); color: #FDE68A; }

    /* Action */
    .action-box {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .action-box.dangerous { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.2); color: #FCA5A5; }
    .action-box.suspicious { background: rgba(217,119,6,0.1); border: 1px solid rgba(217,119,6,0.2); color: #FDE68A; }
    .action-box.safe { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.2); color: #6EE7B7; }
    .action-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    /* URL results */
    .url-section {
      margin: 0 16px 12px;
    }
    .url-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748B;
      margin-bottom: 6px;
    }
    .url-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .url-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .url-dot.dangerous { background: #EF4444; }
    .url-dot.suspicious { background: #F59E0B; }
    .url-dot.safe { background: #10B981; }
    .url-text {
      color: #94A3B8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .url-score { color: #64748B; flex-shrink: 0; }

    /* Error */
    .error-box {
      padding: 20px 16px;
      text-align: center;
    }
    .error-icon { font-size: 28px; margin-bottom: 8px; }
    .error-title { font-size: 14px; font-weight: 600; color: #F87171; margin-bottom: 4px; }
    .error-msg { font-size: 12px; color: #94A3B8; line-height: 1.5; }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-brand {
      font-size: 10px;
      color: #475569;
    }
    .footer-brand span { color: #7F77DD; }
    .check-another {
      font-size: 11px;
      color: #7F77DD;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .check-another:hover { color: #A5B4FC; }

    /* Empty state */
    .empty {
      padding: 28px 16px;
      text-align: center;
      color: #475569;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
    .empty-text { font-size: 13px; line-height: 1.6; }

    .section-content { padding: 0 16px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">G</div>
    <div class="header-title">GuardAI</div>
    <div class="header-sub" id="header-sub">Fraud Detector</div>
  </div>

  <div id="root"></div>

  <div class="footer">
    <div class="footer-brand">Powered by <span>Claude AI</span></div>
    <!-- Note: In Manifest V3, inline onclick="resetState()" is not allowed. We attach the event listener in popup.js -->
    <button class="check-another" id="check-another-btn" style="display:none">
      ← Check another
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
